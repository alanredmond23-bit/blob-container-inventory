<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blob organization — Kanban</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root {
      --bg: #0b0f14; --panel: #141b24; --border: #2a3544; --text: #e8eef5; --muted: #8b9cb3;
      --accent: #38bdf8; --devops: #a78bfa; --finance: #34d399; --legal: #fbbf24;
      --cold: #94a3b8; --dup: #f472b6; --org: #fb923c; --delete: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
    header {
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); background: var(--panel);
      position: sticky; top: 0; z-index: 20;
    }
    header h1 { margin: 0; font-size: 1rem; }
    header p { margin: 0.15rem 0 0; color: var(--muted); font-size: 0.72rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; align-items: center; }
    button, label.btn {
      background: #1e293b; border: 1px solid var(--border); color: var(--text);
      padding: 0.28rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.72rem;
    }
    button:hover { border-color: var(--accent); }
    button.danger:hover { border-color: #f87171; }
    input[type="search"] {
      min-width: 140px; max-width: 220px; padding: 0.28rem 0.45rem; border-radius: 4px;
      border: 1px solid var(--border); background: #0f172a; color: var(--text); font-size: 0.72rem;
    }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 88px); }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    .inbox-panel { border-right: 1px solid var(--border); background: #0f1419; display: flex; flex-direction: column; }
    .inbox-panel h2 { margin: 0; padding: 0.4rem 0.55rem; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    .inbox-meta { padding: 0.3rem 0.55rem; font-size: 0.68rem; color: var(--muted); }
    .card-list { flex: 1; overflow-y: auto; padding: 0.25rem; min-height: 80px; max-height: calc(100vh - 140px); }
    .board-wrap { overflow: auto; padding: 0.5rem; }
    .domains { display: flex; gap: 0.5rem; align-items: flex-start; }
    .domain-col {
      min-width: 248px; max-width: 280px; background: var(--panel); border-radius: 6px;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .domain-head {
      display: flex; align-items: center; justify-content: space-between; gap: 0.25rem;
      padding: 0.35rem 0.45rem; border-bottom: 2px solid var(--muted); border-radius: 6px 6px 0 0;
    }
    .domain-head h2 { margin: 0; font-size: 0.78rem; font-weight: 700; }
    .domain-body { padding: 0.25rem; max-height: calc(100vh - 130px); overflow-y: auto; }
    .domain-col[data-domain="devops"] .domain-head { border-color: var(--devops); }
    .domain-col[data-domain="finance"] .domain-head { border-color: var(--finance); }
    .domain-col[data-domain="legal"] .domain-head { border-color: var(--legal); }
    .domain-col[data-domain="cold"] .domain-head { border-color: var(--cold); }
    .domain-col[data-domain="dup-likely"] .domain-head { border-color: var(--dup); }
    .domain-col[data-domain="organization"] .domain-head { border-color: var(--org); }
    .swim-lane { margin: 0.15rem 0.2rem 0.25rem; border-top: 1px solid var(--border); padding-top: 0.2rem; }
    .swim-inbox-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.15rem 0.3rem; font-size: 0.62rem; font-weight: 700; color: var(--accent);
      background: rgba(56, 189, 248, 0.08); border-radius: 3px 3px 0 0;
    }
    .swim-inbox-head .badge {
      background: var(--accent); color: #0b0f14; border-radius: 10px; padding: 0 0.35rem; font-size: 0.62rem; min-width: 1.1rem; text-align: center;
    }
    .swim-inbox-head.empty { color: var(--muted); background: transparent; }
    .swim-inbox-head.empty .badge { background: #334155; color: var(--muted); }
    .node-l1 { margin: 0.2rem 0; border: 1px solid var(--border); border-radius: 4px; background: rgba(0,0,0,0.15); }
    .node-l1 > summary, .node-l2 > summary {
      cursor: pointer; padding: 0.2rem 0.35rem; font-size: 0.68rem; font-weight: 600;
      color: var(--muted); list-style: none; display: flex; justify-content: space-between; align-items: center;
    }
    .node-l1 > summary::-webkit-details-marker, .node-l2 > summary::-webkit-details-marker { display: none; }
    .node-l2 { margin: 0.15rem 0.25rem; border-left: 2px solid var(--border); padding-left: 0.2rem; }
    .node-l3-wrap { margin: 0.1rem 0.2rem 0.1rem 0.5rem; }
    .node-l3-title { font-size: 0.62rem; color: var(--muted); padding: 0.1rem 0.2rem; }
    .card {
      margin: 0.12rem; padding: 0.2rem 0.35rem; background: #1a2332; border: 1px solid var(--border);
      border-radius: 4px; cursor: grab; line-height: 1.2;
    }
    .card:active { cursor: grabbing; }
    .card.container-card { border-left: 2px solid var(--accent); }
    .card.folder-card { border-left: 2px solid #475569; opacity: 0.95; }
    .card .label { font-weight: 600; font-size: 0.68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; display: inline-block; vertical-align: bottom; }
    .card .meta { color: var(--muted); font-size: 0.62rem; }
    .card.hidden { display: none; }
    .card.selected { outline: 2px solid var(--accent); background: #1a2f4a; }
    .card.marked-delete { border-color: var(--delete); background: #2a1515; }
    .domain-col[data-domain="delete-queue"] .domain-head { border-color: var(--delete); background: #1f1010; }
    .domain-col[data-domain="delete-queue"] .swim-inbox-head { color: #fca5a5; background: rgba(239, 68, 68, 0.12); }
    .domain-col[data-domain="delete-queue"] .swim-inbox-head .badge { background: var(--delete); color: #fff; }
    .sortable-ghost { opacity: 0.35; }
    .mini-btn { font-size: 0.6rem; padding: 0.1rem 0.25rem; border-radius: 3px; }
    .status { padding: 0.35rem 0.55rem; color: var(--muted); font-size: 0.72rem; }
    .error { color: #f87171; }
    .chip { font-size: 0.58rem; color: var(--muted); }
    .list-wrap { flex: 1; overflow: auto; padding: 0.5rem 0.75rem; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .data-table th, .data-table td { border: 1px solid var(--border); padding: 0.35rem 0.5rem; text-align: left; vertical-align: middle; }
    .data-table th { background: var(--panel); color: var(--muted); font-weight: 600; position: sticky; top: 0; z-index: 2; }
    .data-table tbody tr:hover { background: rgba(56, 189, 248, 0.06); }
    .data-table tbody tr.row-delete { background: rgba(239, 68, 68, 0.08); }
    .data-table tbody tr.row-checked { background: #1a2f4a; }
    .data-table .col-check { width: 2.2rem; text-align: center; }
    .data-table .col-name { min-width: 200px; max-width: 420px; }
    .data-table .col-name .label { font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-table .col-name .sub { color: var(--muted); font-size: 0.65rem; }
    .data-table .col-num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .data-table .col-zone { color: var(--muted); font-size: 0.68rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-table .col-actions { width: 4.5rem; text-align: center; }
    .btn-row-delete { background: #3f1515; border: 1px solid var(--delete); color: #fecaca; padding: 0.15rem 0.4rem; border-radius: 3px; cursor: pointer; font-size: 0.68rem; }
    .btn-row-delete:hover { background: var(--delete); color: #fff; }
    #btn-delete-selected:disabled { opacity: 0.4; cursor: not-allowed; }
    .layout.list-mode { grid-template-columns: 1fr; }
    .layout.list-mode .inbox-panel, .layout.list-mode .board-wrap { display: none; }
    .layout.kanban-mode .list-wrap { display: none; }
    select.sort-select { background: #1e293b; border: 1px solid var(--border); color: var(--text); padding: 0.25rem 0.4rem; border-radius: 4px; font-size: 0.72rem; }
  </style>
</head>
<body>
  <header>
    <h1>Blob organization Kanban</h1>
    <p>List view: check rows · <strong>Delete</strong> per row or <strong>Delete selected</strong> → DELETE QUEUE (Approved) · then <strong>Export</strong>.</p>
    <div class="toolbar">
      <input type="search" id="filter" placeholder="Filter…" />
      <label class="btn">Sort
        <select id="sort-by" class="sort-select">
          <option value="name">Name (A–Z)</option>
          <option value="size">Size (largest)</option>
        </select>
      </label>
      <button type="button" id="btn-view-kanban">Kanban board</button>
      <button type="button" id="btn-delete-selected" class="danger" disabled>Delete selected</button>
      <button type="button" id="btn-add-domain">+ Domain</button>
      <button type="button" id="btn-select-all">Select all</button>
      <button type="button" id="btn-to-delete" class="danger">→ Delete queue</button>
      <button type="button" id="btn-export">Export</button>
      <button type="button" id="btn-import">Import</button>
      <button type="button" id="btn-save-reg">Copy for register</button>
      <a class="btn" href="ZONE_INBOX_DUPE_REPORT.md" target="_blank" style="text-decoration:none">Dup report</a>
      <button type="button" class="danger" id="btn-reset">Reset cards</button>
      <label class="btn"><input type="checkbox" id="show-folders" checked /> Folders</label>
      <label class="btn"><input type="checkbox" id="compact-meta" checked /> Compact</label>
      <span id="sel-meta" class="chip"></span>
    </div>
  </header>
  <div id="load-status" class="status">Loading…</div>
  <div class="layout list-mode" id="main" hidden>
    <div class="list-wrap">
      <table class="data-table" id="card-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="check-all" title="Select all visible" /></th>
            <th class="col-name">Name</th>
            <th>Type</th>
            <th class="col-zone">Zone</th>
            <th class="col-num">Blobs</th>
            <th class="col-num">Size</th>
            <th class="col-actions">Delete</th>
          </tr>
        </thead>
        <tbody id="card-tbody"></tbody>
      </table>
    </div>
    <aside class="inbox-panel">
      <h2>Inbox</h2>
      <div class="inbox-meta" id="inbox-meta"></div>
      <div class="card-list" id="inbox" data-zone="inbox"></div>
    </aside>
    <main class="board-wrap"><div class="domains" id="domains"></div></main>
  </div>
  <input type="file" id="file-import" accept="application/json" hidden" />

  <script>
    const STORAGE_V2 = "blob_kanban_board_v2";
    const STORAGE_V1 = "blob_kanban_homes_v1";
    const STORAGE_SORT = "blob_kanban_sort";
    const STORAGE_VIEW = "blob_kanban_view";

    const MATTER_L2 = [
      { id: "evidence", title: "Evidence" },
      { id: "discovery", title: "Discovery" },
      { id: "filings", title: "Filings" },
      { id: "strategy", title: "Strategy" },
      { id: "unfiled", title: "Unfiled" },
    ];

    function matterNode(id, title) {
      return { id, title, children: MATTER_L2.map((x) => ({ ...x, children: [] })) };
    }

    function defaultBoard() {
      return {
        version: 2,
        domains: [
          {
            id: "devops", title: "DEVOPS", color: "devops",
            children: [
              { id: "hot-active", title: "Hot / active", children: [] },
              { id: "backups-caches", title: "Backups & caches", children: [] },
              { id: "tooling-repos", title: "Tooling & repos", children: [] },
              { id: "unfiled", title: "Unfiled", children: [] },
            ],
          },
          {
            id: "finance", title: "FINANCE / CASH", color: "finance",
            children: [
              { id: "banking-cash", title: "Banking & cash", children: [] },
              { id: "tax", title: "Tax", children: [] },
              { id: "verticals", title: "Money verticals", children: [] },
              { id: "unfiled", title: "Unfiled", children: [] },
            ],
          },
          {
            id: "legal", title: "LEGAL", color: "legal",
            children: [
              matterNode("bk-24-13093", "BK 24-13093"),
              matterNode("ap-25-00254", "AP 25-00254"),
              matterNode("foreclosure-25-13446", "Foreclosure 25-13446"),
              matterNode("general-legal", "General / cross-matter"),
            ],
          },
          {
            id: "dup-likely", title: "DUP LIKELY", color: "dup",
            children: [
              { id: "etag-exact", title: "ETag / size exact", children: [] },
              { id: "md5-pending", title: "MD5 pending", children: [] },
              { id: "structural-mirror", title: "Structural mirror", children: [] },
              { id: "review-before-delete", title: "Review before delete", children: [] },
              { id: "unfiled", title: "Unfiled", children: [] },
            ],
          },
          {
            id: "cold", title: "COLD ARCHIVE", color: "cold",
            children: [
              { id: "legal-cold", title: "Legal cold", children: [] },
              { id: "finance-cold", title: "Finance cold", children: [] },
              { id: "devops-cold", title: "DevOps cold", children: [] },
              { id: "unfiled", title: "Unfiled", children: [] },
            ],
          },
          {
            id: "delete-queue", title: "DELETE QUEUE", color: "delete",
            children: [
              { id: "approved", title: "Approved — export to run delete", children: [] },
              { id: "staged", title: "Staged / review", children: [] },
            ],
          },
          {
            id: "organization", title: "ORGANIZATION", color: "org",
            children: [
              { id: "mirrors", title: "Mirrors / duplicates of hot", children: [] },
              { id: "onedrive-trees", title: "OneDrive / desktop trees", children: [] },
              { id: "super-master", title: "Super-master triage", children: [] },
              { id: "loose-uploads", title: "Loose / uploads", children: [] },
              { id: "unfiled", title: "Unfiled", children: [] },
            ],
          },
        ],
      };
    }

    function ensureDeleteQueueDomain() {
      const dq = {
        id: "delete-queue",
        title: "DELETE QUEUE",
        color: "delete",
        children: [
          { id: "approved", title: "Approved — export to run delete", children: [] },
          { id: "staged", title: "Staged / review", children: [] },
        ],
      };
      const i = board.domains.findIndex((d) => d.id === "delete-queue");
      if (i >= 0) board.domains[i] = { ...dq, children: board.domains[i].children || dq.children };
      else {
        const orgIdx = board.domains.findIndex((d) => d.id === "organization");
        if (orgIdx >= 0) board.domains.splice(orgIdx, 0, dq);
        else board.domains.push(dq);
      }
      sortDomains();
    }

    function deleteQueueCount() {
      return Object.values(assignments).filter((a) => {
        const p = a.path || [];
        return p[0] === "delete-queue" && p[1] === "approved";
      }).length;
    }

    const DOMAIN_ORDER = ["devops", "finance", "legal", "dup-likely", "delete-queue", "cold", "organization"];
    const DELETE_APPROVED = ["delete-queue", "approved"];

    function sortDomains() {
      board.domains.sort(
        (a, b) =>
          (DOMAIN_ORDER.indexOf(a.id) === -1 ? 99 : DOMAIN_ORDER.indexOf(a.id)) -
          (DOMAIN_ORDER.indexOf(b.id) === -1 ? 99 : DOMAIN_ORDER.indexOf(b.id))
      );
    }

    const V1_ZONE_MAP = {
      "devops:hot-active": ["devops", "hot-active"],
      "devops:backups-caches": ["devops", "backups-caches"],
      "devops:tooling-repos": ["devops", "tooling-repos"],
      "devops:unfiled": ["devops", "unfiled"],
      "finance:banking-cash": ["finance", "banking-cash"],
      "finance:tax": ["finance", "tax"],
      "finance:verticals": ["finance", "verticals"],
      "finance:unfiled": ["finance", "unfiled"],
      "legal:matters-active": ["legal", "general-legal", "strategy"],
      "legal:discovery": ["legal", "general-legal", "discovery"],
      "legal:filings": ["legal", "general-legal", "filings"],
      "legal:evidence": ["legal", "general-legal", "evidence"],
      "legal:calls-audio": ["legal", "general-legal", "evidence"],
      "legal:unfiled": ["legal", "general-legal", "unfiled"],
      "cold:legal-cold": ["cold", "legal-cold"],
      "cold:finance-cold": ["cold", "finance-cold"],
      "cold:devops-cold": ["cold", "devops-cold"],
      "cold:unfiled": ["cold", "unfiled"],
    };

    let board = defaultBoard();
    let assignments = {};
    let allCards = [];
    let containerHints = {};
    const selected = new Set();
    let listView = true;

    function pathLabel(path) {
      if (!path || !path.length) return "inbox";
      return path.join(" → ");
    }

    function isDeleteQueued(path) {
      return path && path[0] === "delete-queue";
    }

    function getVisibleCards() {
      const showFolders = document.getElementById("show-folders").checked;
      const q = document.getElementById("filter").value.trim().toLowerCase();
      return allCards.filter((card) => {
        if (card.type === "folder" && !showFolders) return false;
        const search = (card.label + " " + card.container).toLowerCase();
        if (q && !search.includes(q)) return false;
        return true;
      });
    }

    function sortCards(cards) {
      const mode = document.getElementById("sort-by").value;
      const sorted = [...cards];
      if (mode === "size") {
        sorted.sort((a, b) => b.bytes - a.bytes || a.label.localeCompare(b.label));
      } else {
        sorted.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: "base" }));
      }
      return sorted;
    }

    function updateDeleteSelectedBtn() {
      const btn = document.getElementById("btn-delete-selected");
      const n = selected.size;
      btn.disabled = n === 0;
      btn.textContent = n ? `Delete selected (${n})` : "Delete selected";
      updateSelectionMeta();
    }

    function syncCheckAllState() {
      const boxes = [...document.querySelectorAll("#card-tbody .row-check")];
      const all = document.getElementById("check-all");
      if (!all || !boxes.length) {
        if (all) all.checked = false;
        return;
      }
      const checked = boxes.filter((b) => b.checked).length;
      all.checked = checked === boxes.length;
      all.indeterminate = checked > 0 && checked < boxes.length;
    }

    function moveIdsToDelete(ids) {
      if (!ids.length) return;
      if (!confirm(`Move ${ids.length} item(s) to DELETE QUEUE → Approved? Export afterward for agent.`)) return;
      assignPath(ids, DELETE_APPROVED);
      selected.clear();
      updateDeleteSelectedBtn();
      syncCheckAllState();
    }

    function renderListView() {
      const tbody = document.getElementById("card-tbody");
      if (!tbody) return;
      tbody.innerHTML = "";
      const cards = sortCards(getVisibleCards());
      let queued = 0;
      cards.forEach((card) => {
        const a = assignments[card.id];
        const path = a?.path;
        const zone = pathLabel(path);
        const tr = document.createElement("tr");
        if (isDeleteQueued(path)) {
          tr.classList.add("row-delete");
          queued++;
        }
        const checked = selected.has(card.id);
        if (checked) tr.classList.add("row-checked");
        tr.dataset.id = card.id;
        tr.dataset.search = (card.label + " " + card.container).toLowerCase();
        const blobs = card.blobs.toLocaleString();
        tr.innerHTML = `
          <td class="col-check"><input type="checkbox" class="row-check" data-id="${escapeHtml(card.id)}" ${checked ? "checked" : ""} /></td>
          <td class="col-name">
            <span class="label" title="${escapeHtml(card.label)}">${escapeHtml(card.label)}</span>
            <span class="sub">${escapeHtml(card.container)}${card.folder ? " / " + escapeHtml(card.folder) : ""}</span>
          </td>
          <td>${card.type === "container" ? "container" : "folder"}</td>
          <td class="col-zone" title="${escapeHtml(zone)}">${escapeHtml(zone)}</td>
          <td class="col-num">${blobs}</td>
          <td class="col-num">${escapeHtml(card.bytes_human)}</td>
          <td class="col-actions"><button type="button" class="btn-row-delete" data-id="${escapeHtml(card.id)}">Delete</button></td>`;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll(".row-check").forEach((cb) => {
        cb.addEventListener("change", () => {
          const id = cb.dataset.id;
          if (cb.checked) selected.add(id);
          else selected.delete(id);
          const row = cb.closest("tr");
          row?.classList.toggle("row-checked", cb.checked);
          updateDeleteSelectedBtn();
          syncCheckAllState();
        });
      });
      tbody.querySelectorAll(".btn-row-delete").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          moveIdsToDelete([btn.dataset.id]);
        });
      });

      const placed = Object.keys(assignments).length;
      document.getElementById("load-status").textContent =
        `${cards.length} shown · ${allCards.length} total · ${placed} placed · ${queued} in delete queue · sort: ${document.getElementById("sort-by").value}`;
      if (document.getElementById("inbox-meta")) {
        document.getElementById("inbox-meta").textContent =
          `${allCards.length - placed} inbox · ${placed} placed`;
      }
      syncCheckAllState();
      updateDeleteSelectedBtn();
    }

    function setViewMode(kanban) {
      listView = !kanban;
      const layout = document.getElementById("main");
      layout.classList.toggle("list-mode", listView);
      layout.classList.toggle("kanban-mode", !listView);
      document.getElementById("btn-view-kanban").textContent = listView ? "Kanban board" : "List view";
      localStorage.setItem(STORAGE_VIEW, listView ? "list" : "kanban");
      if (listView) renderListView();
      else placeCards();
    }

    function zoneKey(path) {
      return path.join("|");
    }

    function ensureOrganizationDomain() {
      const org = {
        id: "organization",
        title: "ORGANIZATION",
        color: "org",
        children: [
          { id: "mirrors", title: "Mirrors / duplicates of hot", children: [] },
          { id: "onedrive-trees", title: "OneDrive / desktop trees", children: [] },
          { id: "super-master", title: "Super-master triage", children: [] },
          { id: "loose-uploads", title: "Loose / uploads", children: [] },
          { id: "unfiled", title: "Unfiled", children: [] },
        ],
      };
      const i = board.domains.findIndex((d) => d.id === "organization");
      if (i >= 0) board.domains[i] = { ...org, children: board.domains[i].children || org.children };
      else board.domains.push(org);
      sortDomains();
    }

    function slug(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 48) || "node";
    }

    function migrateV1Entry(entry) {
      if (entry.path && Array.isArray(entry.path)) return entry;
      if (entry.domain && entry.sub) {
        const k = `${entry.domain}:${entry.sub}`;
        const path = V1_ZONE_MAP[k] || [entry.domain, entry.sub];
        return { path, moved_at: entry.moved_at };
      }
      return entry;
    }

    function loadState() {
      let v2 = null;
      try {
        const raw = localStorage.getItem(STORAGE_V2);
        if (raw) v2 = JSON.parse(raw);
      } catch (_) {}
      if (v2 && v2.board) board = v2.board;
      ensureOrganizationDomain();
      if (v2 && v2.assignments) {
        assignments = {};
        for (const [id, a] of Object.entries(v2.assignments)) {
          assignments[id] = migrateV1Entry(a);
        }
        return;
      }
      try {
        const raw1 = localStorage.getItem(STORAGE_V1);
        if (raw1) {
          const old = JSON.parse(raw1);
          assignments = {};
          for (const [id, a] of Object.entries(old)) {
            assignments[id] = migrateV1Entry(a);
          }
        }
      } catch (_) {}
    }

    function saveState() {
      localStorage.setItem(
        STORAGE_V2,
        JSON.stringify({ board, assignments, saved_at: new Date().toISOString() }, null, 2)
      );
    }

    function mergeAssignmentsFrom(data, label) {
      let n = 0;
      const reg = data.assignments || data;
      if (!reg || typeof reg !== "object") return 0;
      for (const [id, a] of Object.entries(reg)) {
        if (!assignments[id]) {
          assignments[id] = migrateV1Entry(a);
          n++;
        }
      }
        if (data.board) {
          board = data.board;
        }
        ensureOrganizationDomain();
      return n;
    }

    async function mergeRemoteJson(url, overwrite = false) {
      try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) return 0;
        const data = await res.json();
        const reg = data.assignments || data;
        let n = 0;
        for (const [id, a] of Object.entries(reg)) {
          if (overwrite || !assignments[id]) {
            assignments[id] = migrateV1Entry(a);
            n++;
          }
        }
        if (data.board) {
          board = data.board;
          ensureOrganizationDomain();
        }
        return n;
      } catch (_) {
        return 0;
      }
    }

    async function mergeBoardSeed() {
      try {
        const res = await fetch("kanban_board_seed.json", { cache: "no-store" });
        if (!res.ok) return;
        const seed = await res.json();
        (seed.domains || []).forEach((patch) => {
          const dom = board.domains.find((d) => d.id === patch.id);
          if (!dom) return;
          const ids = new Set((dom.children || []).map((c) => c.id));
          (patch.children || []).forEach((ch) => {
            if (!ids.has(ch.id)) dom.children.push(ch);
          });
        });
        (seed.container_hints || []).forEach((h) => {
          containerHints[h.container] = h.suggest;
        });
        board._seedVersion = seed.version;
      } catch (_) {}
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function cardEl(card) {
      const compact = document.getElementById("compact-meta").checked;
      const div = document.createElement("div");
      div.className = "card " + (card.type === "container" ? "container-card" : "folder-card");
      div.dataset.id = card.id;
      div.dataset.search = (card.label + " " + card.container).toLowerCase();
      const meta = `${(card.blobs / 1000).toFixed(0)}k · ${card.bytes_human}`;
      const hint = containerHints[card.container];
      const hintTip = hint ? ` · hint: ${hint.join(" → ")}` : "";
      if (compact) {
        div.innerHTML = `<span class="label" title="${escapeHtml(card.label + hintTip)}">${escapeHtml(card.label)}</span> <span class="meta">${meta}</span>`;
      } else {
        div.innerHTML = `<div class="label" title="${escapeHtml(card.label)}">${escapeHtml(card.label)}</div><div class="meta">${card.blobs.toLocaleString()} · ${card.bytes_human}</div>`;
      }
      bindCardSelect(div);
      const ap = assignments[card.id]?.path;
      if (ap && ap[0] === "delete-queue") div.classList.add("marked-delete");
      return div;
    }

    function updateSelectionMeta() {
      const el = document.getElementById("sel-meta");
      if (!el) return;
      el.textContent = selected.size ? `${selected.size} selected` : "";
    }

    function clearSelection() {
      selected.clear();
      document.querySelectorAll(".card.selected").forEach((c) => c.classList.remove("selected"));
      updateSelectionMeta();
    }

    function toggleSelect(cardEl, additive) {
      const id = cardEl.dataset.id;
      if (!additive) {
        clearSelection();
      }
      if (selected.has(id)) selected.delete(id);
      else selected.add(id);
      cardEl.classList.toggle("selected", selected.has(id));
      updateSelectionMeta();
    }

    function bindCardSelect(cardEl) {
      cardEl.addEventListener("click", (e) => {
        if (!(e.shiftKey || e.ctrlKey || e.metaKey)) return;
        e.preventDefault();
        e.stopPropagation();
        toggleSelect(cardEl, e.ctrlKey || e.metaKey);
      });
      cardEl.addEventListener("contextmenu", (e) => {
        if (!e.shiftKey) return;
        e.preventDefault();
        toggleSelect(cardEl, true);
      });
    }

    function assignPath(ids, path) {
      const ts = new Date().toISOString();
      ids.forEach((cid) => {
        if (!path) delete assignments[cid];
        else assignments[cid] = { path, moved_at: ts };
      });
      saveState();
      if (listView) renderListView();
      else placeCards();
    }

    function moveSelectedToDelete() {
      if (!selected.size) {
        alert("Check one or more rows first");
        return;
      }
      moveIdsToDelete([...selected]);
    }

    function getNodesAtPath(path) {
      const dom = board.domains.find((d) => d.id === path[0]);
      if (!dom) return null;
      let nodes = dom.children;
      for (let i = 1; i < path.length; i++) {
        const n = nodes.find((x) => x.id === path[i]);
        if (!n) return null;
        nodes = n.children;
      }
      return nodes;
    }

    function pathExists(path) {
      if (!path || !path.length) return false;
      const dom = board.domains.find((d) => d.id === path[0]);
      if (!dom) return false;
      let nodes = dom.children;
      for (let i = 1; i < path.length; i++) {
        const n = nodes.find((x) => x.id === path[i]);
        if (!n) return false;
        nodes = n.children || [];
      }
      return true;
    }

    function renderDropList(path) {
      const wrap = document.createElement("div");
      wrap.className = "swim-lane";
      const zk = zoneKey(path);
      const head = document.createElement("div");
      head.className = "swim-inbox-head empty";
      head.dataset.zoneBadge = zk;
      head.innerHTML = `Inbox <span class="badge">0</span>`;
      const el = document.createElement("div");
      el.className = "card-list";
      el.dataset.zone = zk;
      wrap.appendChild(head);
      wrap.appendChild(el);
      return wrap;
    }

    function updateZoneBadges() {
      document.querySelectorAll(".swim-inbox-head").forEach((head) => {
        const zk = head.dataset.zoneBadge;
        const list = document.querySelector(`.card-list[data-zone="${zk}"]`);
        const n = list ? list.querySelectorAll(".card:not(.hidden)").length : 0;
        head.querySelector(".badge").textContent = String(n);
        head.classList.toggle("empty", n === 0);
      });
    }

    function addChildBtn(path, level, parentEl) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "mini-btn";
      b.textContent = `+L${level}`;
      b.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const title = prompt(`Name for L${level}:`);
        if (!title) return;
        const id = slug(title);
        const nodes = getNodesAtPath(path);
        if (!nodes) return;
        if (nodes.some((n) => n.id === id)) {
          alert("Already exists");
          return;
        }
        const child = { id, title, children: [] };
        if (level === 1 && path.length === 1 && board.domains.find((d) => d.id === path[0])?.id === "legal") {
          Object.assign(child, { children: MATTER_L2.map((x) => ({ ...x, children: [] })) });
        }
        nodes.push(child);
        saveState();
        buildBoard();
        placeCards();
      };
      parentEl.appendChild(b);
    }

    function renderNodeTree(node, path, depth) {
      const frag = document.createDocumentFragment();
      const hasKids = node.children && node.children.length > 0;
      if (!hasKids) {
        frag.appendChild(renderDropList(path));
        return frag;
      }
      const det = document.createElement("details");
      det.className = depth === 1 ? "node-l1" : "node-l2";
      det.open = depth === 1 && (path[1] === "general-legal" || (path[1] || "").startsWith("bk-"));
      const sum = document.createElement("summary");
      sum.innerHTML = `<span>${escapeHtml(node.title)}</span>`;
      if (depth === 1) addChildBtn([path[0]], 2, sum);
      else if (depth === 2) addChildBtn(path.slice(0, 2), 3, sum);
      else addChildBtn(path.slice(0, 3), 4, sum);
      det.appendChild(sum);
      node.children.forEach((child) => {
        const childPath = [...path, child.id];
        if (!child.children || child.children.length === 0) {
          const row = document.createElement("div");
          row.style.margin = "0.08rem 0.2rem";
          const head = document.createElement("div");
          head.className = "node-l3-title";
          head.style.fontWeight = depth === 1 ? "600" : "normal";
          head.textContent = child.title;
          row.appendChild(head);
          row.appendChild(renderDropList(childPath));
          det.appendChild(row);
        } else {
          det.appendChild(renderNodeTree(child, childPath, depth + 1));
        }
      });
      frag.appendChild(det);
      return frag;
    }

    function buildBoard() {
      sortDomains();
      const root = document.getElementById("domains");
      root.innerHTML = "";
      board.domains.forEach((dom) => {
        const col = document.createElement("section");
        col.className = "domain-col";
        col.dataset.domain = dom.id;
        const head = document.createElement("div");
        head.className = "domain-head";
        head.innerHTML = `<h2>${escapeHtml(dom.title)}</h2>`;
        const hb = document.createElement("span");
        addChildBtn([dom.id], 1, hb);
        head.appendChild(hb);
        col.appendChild(head);
        const body = document.createElement("div");
        body.className = "domain-body";
        (dom.children || []).forEach((l1) => {
          body.appendChild(renderNodeTree(l1, [dom.id, l1.id], 1));
        });
        col.appendChild(body);
        root.appendChild(col);
      });
    }

    function resolveTarget(path) {
      if (!pathExists(path)) return null;
      return document.querySelector(`[data-zone="${zoneKey(path)}"]`);
    }

    function placeCards() {
      if (listView) {
        renderListView();
        return;
      }
      document.querySelectorAll(".card-list").forEach((el) => (el.innerHTML = ""));
      const showFolders = document.getElementById("show-folders").checked;
      const inbox = document.getElementById("inbox");
      let inboxCount = 0;
      allCards.forEach((card) => {
        if (card.type === "folder" && !showFolders) return;
        const a = assignments[card.id];
        let target = inbox;
        if (a && a.path) {
          const el = resolveTarget(a.path);
          if (el) target = el;
        } else inboxCount++;
        target.appendChild(cardEl(card));
      });
      document.getElementById("inbox-meta").textContent =
        `${inboxCount} inbox · ${Object.keys(assignments).length} placed · ${allCards.length} cards`;
      applyFilter();
      initSortable();
      updateZoneBadges();
    }

    function pathFromZone(zone) {
      if (!zone || zone === "inbox") return null;
      return zone.split("|");
    }

    function onSortEnd(evt) {
      const id = evt.item.dataset.id;
      const zone = evt.to.dataset.zone;
      if (!id || !zone) return;
      const ids = selected.size > 0 && selected.has(id) ? [...selected] : [id];
      const path = zone === "inbox" ? null : pathFromZone(zone);
      assignPath(ids, path);
      clearSelection();
    }

    function updateInboxMeta() {
      const n = document.getElementById("inbox").querySelectorAll(".card").length;
      document.getElementById("inbox-meta").textContent =
        `${n} inbox · ${Object.keys(assignments).length} placed · ${allCards.length} cards`;
    }

    let sortables = [];
    function initSortable() {
      sortables.forEach((s) => s.destroy());
      sortables = [];
      document.querySelectorAll(".card-list").forEach((el) => {
        sortables.push(
          Sortable.create(el, {
            group: "kanban",
            animation: 100,
            delay: 80,
            delayOnTouchOnly: true,
            ghostClass: "sortable-ghost",
            onEnd: onSortEnd,
          })
        );
      });
    }

    function applyFilter() {
      if (listView) {
        renderListView();
        return;
      }
      const q = document.getElementById("filter").value.trim().toLowerCase();
      document.querySelectorAll(".card").forEach((el) => {
        el.classList.toggle("hidden", q && !el.dataset.search.includes(q));
      });
      updateZoneBadges();
    }

    function exportAll() {
      const dq = deleteQueueCount();
      const out = {
        version: 2,
        exported_at: new Date().toISOString(),
        board,
        assignments,
        delete_queue_count: dq,
      };
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "blob_homes_assignments.json";
      a.click();
      alert(
        dq
          ? `Exported ${Object.keys(assignments).length} placements · ${dq} in DELETE QUEUE (approved). Upload/drop file for agent to run deletes.`
          : `Exported ${Object.keys(assignments).length} placements.`
      );
    }

    function copyForRegister() {
      const text = JSON.stringify({ version: 2, board, assignments }, null, 2);
      navigator.clipboard.writeText(text).then(() => alert("Copied! Paste into registered_homes.json or run register_kanban_homes.py"));
    }

    document.getElementById("btn-export").onclick = exportAll;
    document.getElementById("btn-to-delete").onclick = moveSelectedToDelete;
    document.getElementById("btn-delete-selected").onclick = moveSelectedToDelete;
    document.getElementById("btn-view-kanban").onclick = () => setViewMode(listView);
    document.getElementById("sort-by").onchange = () => {
      localStorage.setItem(STORAGE_SORT, document.getElementById("sort-by").value);
      renderListView();
    };
    document.getElementById("check-all").onchange = (e) => {
      const on = e.target.checked;
      document.querySelectorAll("#card-tbody .row-check").forEach((cb) => {
        cb.checked = on;
        const id = cb.dataset.id;
        if (on) selected.add(id);
        else selected.delete(id);
        cb.closest("tr")?.classList.toggle("row-checked", on);
      });
      updateDeleteSelectedBtn();
    };
    document.getElementById("btn-select-all").onclick = () => {
      document.getElementById("check-all").checked = true;
      document.getElementById("check-all").dispatchEvent(new Event("change"));
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Delete" && selected.size) {
        e.preventDefault();
        moveSelectedToDelete();
      }
    });
    document.getElementById("btn-save-reg").onclick = copyForRegister;
    document.getElementById("btn-reset").onclick = () => {
      if (confirm("Clear card placements only? (keeps board structure)")) {
        assignments = {};
        saveState();
        placeCards();
      }
    };
    document.getElementById("btn-import").onclick = () => document.getElementById("file-import").click();
    document.getElementById("file-import").onchange = (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (data.board) board = data.board;
          const incoming = data.assignments || data;
          for (const [id, a] of Object.entries(incoming)) assignments[id] = migrateV1Entry(a);
          saveState();
          buildBoard();
          placeCards();
        } catch (err) {
          alert(err.message);
        }
      };
      r.readAsText(f);
    };
    document.getElementById("btn-add-domain").onclick = () => {
      const title = prompt("New domain name:");
      if (!title) return;
      const id = slug(title);
      if (board.domains.some((d) => d.id === id)) {
        alert("Exists");
        return;
      }
      board.domains.push({ id, title, color: "cold", children: [{ id: "unfiled", title: "Unfiled", children: [] }] });
      saveState();
      buildBoard();
      placeCards();
    };
    document.getElementById("filter").oninput = applyFilter;
    document.getElementById("show-folders").onchange = placeCards;
    document.getElementById("compact-meta").onchange = placeCards;

    async function init() {
      loadState();
      const savedSort = localStorage.getItem(STORAGE_SORT);
      if (savedSort) document.getElementById("sort-by").value = savedSort;
      listView = localStorage.getItem(STORAGE_VIEW) !== "kanban";
      ensureDeleteQueueDomain();
      ensureOrganizationDomain();
      await mergeBoardSeed();
      ensureDeleteQueueDomain();
      ensureOrganizationDomain();
      const nDrop = await mergeRemoteJson("blob_homes_assignments.json", true);
      if (nDrop) saveState();
      buildBoard();
      try {
        const res = await fetch("kanban_data.json", { cache: "no-store" });
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        allCards = data.cards || [];
        const dq = deleteQueueCount();
        document.getElementById("main").hidden = false;
        setViewMode(!listView);
        if (!listView) {
          document.getElementById("load-status").textContent =
            `Ready — ${allCards.length} cards · ${Object.keys(assignments).length} placed` +
            (dq ? ` · ${dq} queued for DELETE` : "") +
            (nDrop ? ` · synced server export` : "");
          placeCards();
        } else {
          renderListView();
          if (dq || nDrop) {
            const extra = (dq ? ` · ${dq} queued for DELETE` : "") + (nDrop ? ` · synced export` : "");
            document.getElementById("load-status").textContent += extra;
          }
        }
      } catch (err) {
        document.getElementById("load-status").innerHTML = `<span class="error">${escapeHtml(err)}</span>`;
      }
    }
    init();
  </script>
</body>
</html>
