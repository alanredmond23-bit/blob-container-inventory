  <style>
    :root {
      --bg: #107c41; --sheet: #fff; --border: #d4d4d4; --header: #f3f3f3;
      --text: #000; --muted: #444; --tab: #217346;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", Calibri, system-ui, sans-serif; background: #1a1a1a; }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .titlebar {
      background: var(--tab); color: #fff; padding: 0.35rem 0.75rem; font-size: 0.85rem;
      display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }
    .tab {
      background: var(--sheet); color: var(--text); padding: 0.2rem 0.75rem;
      border-radius: 4px 4px 0 0; font-weight: 600; font-size: 0.8rem;
    }
    .toolbar {
      background: #f9f9f9; border-bottom: 1px solid var(--border);
      padding: 0.35rem 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0;
    }
    .toolbar input {
      padding: 0.3rem 0.5rem; border: 1px solid var(--border); border-radius: 3px; min-width: 220px;
    }
    .toolbar span { color: var(--muted); font-size: 0.75rem; }
    .sheet-wrap { flex: 1; overflow: auto; background: var(--sheet); }
    table.sheet {
      border-collapse: collapse; width: max-content; min-width: 100%; font-size: 0.82rem;
    }
    .sheet th, .sheet td {
      border: 1px solid var(--border); padding: 0.25rem 0.45rem; white-space: nowrap;
      color: var(--text);
    }
    .sheet thead th {
      background: var(--header); font-weight: 600; position: sticky; top: 0; z-index: 2;
      box-shadow: 0 1px 0 var(--border);
    }
    .sheet tbody tr:nth-child(even) { background: #fafafa; }
    .sheet tbody tr:hover { background: #e8f4fc; }
    .sheet .col-num { text-align: right; width: 2.5rem; background: #f3f3f3; color: var(--muted); }
    .sheet .col-cat { min-width: 140px; }
    .sheet .col-desc { min-width: 220px; max-width: 320px; white-space: normal; }
    .meta-row td { background: #fffde7; font-weight: 600; border-bottom: 2px solid var(--border); }
    tr.hidden { display: none; }
    .photos-bar {
      flex-shrink: 0; max-height: 28vh; overflow: auto; background: #eee;
      border-top: 2px solid var(--tab); padding: 0.5rem; display: flex; gap: 0.5rem;
    }
    .photos-bar img { max-height: 24vh; border: 1px solid var(--border); }
  </style>

      tr.innerHTML = `
        <td class="col-num">${i + 1}</td>
        <td>${r.sort_order}</td>
        <td class="col-cat">${esc(r.category)}</td>
        <td class="col-desc">${esc(r.description)}</td>

    });
    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    document.getElementById("filter").oninput = (e) => {
      const q = e.target.value.trim().toLowerCase();
      let n = 0;
      tbody.querySelectorAll("tr").forEach((tr) => {
        const show = !q || tr.dataset.search.includes(q);
        tr.classList.toggle("hidden", !show);
        if (show) n++;
      });
      document.getElementById("count").textContent = q ? `${n} / ${ROWS.length} rows` : `${ROWS.length} rows`;
